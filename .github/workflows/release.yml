name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../gh-inbox-${{ matrix.target }}.tar.gz gh-inbox
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: gh-inbox-${{ matrix.target }}
          path: gh-inbox-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gh-inbox-aarch64-apple-darwin.tar.gz
            gh-inbox-x86_64-apple-darwin.tar.gz
            gh-inbox-x86_64-unknown-linux-gnu.tar.gz

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo chasenyc/gh-inbox \
            --pattern '*.tar.gz'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute checksums
        id: sha
        run: |
          echo "arm=$(sha256sum gh-inbox-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "intel=$(sha256sum gh-inbox-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux=$(sha256sum gh-inbox-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA_ARM: ${{ steps.sha.outputs.arm }}
          SHA_INTEL: ${{ steps.sha.outputs.intel }}
          SHA_LINUX: ${{ steps.sha.outputs.linux }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/chasenyc/homebrew-tap.git tap
          mkdir -p tap/Formula

          cat > tap/Formula/gh-inbox.rb <<EOF
          class GhInbox < Formula
            desc "Terminal dashboard for GitHub pull requests"
            homepage "https://github.com/chasenyc/gh-inbox"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/chasenyc/gh-inbox/releases/download/v${VERSION}/gh-inbox-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM}"
              else
                url "https://github.com/chasenyc/gh-inbox/releases/download/v${VERSION}/gh-inbox-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_INTEL}"
              end
            end

            on_linux do
              url "https://github.com/chasenyc/gh-inbox/releases/download/v${VERSION}/gh-inbox-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "gh-inbox"
            end

            test do
              assert_match "gh-inbox", shell_output("#{bin}/gh-inbox --version")
            end
          end
          EOF

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' tap/Formula/gh-inbox.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gh-inbox.rb
          git commit -m "Update gh-inbox to ${VERSION}"
          git push
